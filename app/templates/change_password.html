{% extends "base.html" %}

{% block title %}修改密码 — Atlas{% endblock %}
{% block page_heading %}修改密码{% endblock %}
{% block page_subheading %}更新您的登录密码{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="content-card">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label" for="old_password">旧密码</label>
                    <input type="password" class="form-control" id="old_password" name="old_password" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="new_password">新密码</label>
                    <input type="password" class="form-control" id="new_password" name="new_password"
                           placeholder="至少 6 位，需包含字母和数字"
                           minlength="6" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="confirm_password">确认新密码</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                           placeholder="请再次输入新密码" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">修改密码</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
